services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: kubeorch_user
      POSTGRES_PASSWORD: kubeorch_password
      POSTGRES_DB: kubeorch_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: