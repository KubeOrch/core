apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Name }}
  namespace: {{ .Namespace | default "default" }}
  labels:
    app: {{ .Name }}
    managed-by: kubeorch
    {{- range $key, $value := .Labels }}
    {{ $key }}: {{ $value }}
    {{- end }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: {{ .ScaleTargetKind | default "Deployment" }}
    name: {{ .ScaleTargetName }}
  minReplicas: {{ .MinReplicas | default 1 }}
  maxReplicas: {{ .MaxReplicas }}
  metrics:
  {{- if .TargetCPUUtilization }}
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .TargetCPUUtilization }}
  {{- end }}
  {{- if .TargetMemoryUtilization }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .TargetMemoryUtilization }}
  {{- end }}
  {{- if or .ScaleDownStabilization .ScaleUpStabilization }}
  behavior:
    {{- if .ScaleDownStabilization }}
    scaleDown:
      stabilizationWindowSeconds: {{ .ScaleDownStabilization }}
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    {{- end }}
    {{- if .ScaleUpStabilization }}
    scaleUp:
      stabilizationWindowSeconds: {{ .ScaleUpStabilization }}
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
    {{- end }}
  {{- end }}
