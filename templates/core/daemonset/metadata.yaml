id: core/daemonset
name: daemonset
displayName: DaemonSet
category: core
description: Run one pod on every node for log collectors, monitoring agents, and node-level services
icon: Layers
version: "1.0.0"
tags:
  - daemon
  - node
  - monitoring
  - logging
usageFrequency: medium
difficulty: medium
dependencies: []
parameters:
  - name: name
    label: DaemonSet Name
    description: Name of the Kubernetes DaemonSet
    type: string
    required: true
    default: "my-daemonset"
  - name: namespace
    label: Namespace
    description: Kubernetes namespace
    type: string
    required: false
    default: "default"
  - name: image
    label: Container Image
    description: Docker image to run on each node
    type: string
    required: true
  - name: port
    label: Container Port
    description: Port that the container exposes
    type: number
    required: false
  - name: updateStrategy
    label: Update Strategy
    description: How to update pods when the DaemonSet is updated
    type: select
    required: false
    default: "RollingUpdate"
    options:
      - value: "RollingUpdate"
        label: "RollingUpdate - Gradually update pods"
      - value: "OnDelete"
        label: "OnDelete - Update only when deleted"
  - name: maxUnavailable
    label: Max Unavailable
    description: Maximum number of unavailable pods during update
    type: number
    required: false
    default: 1
  - name: nodeSelector
    label: Node Selector
    description: Labels to select which nodes to run on
    type: object
    required: false
  - name: tolerations
    label: Tolerations
    description: Pod tolerations for node taints
    type: array
    required: false
  - name: hostNetwork
    label: Host Network
    description: Use the host network namespace
    type: boolean
    required: false
    default: false
  - name: hostPID
    label: Host PID
    description: Use the host PID namespace
    type: boolean
    required: false
    default: false
  - name: env
    label: Environment Variables
    description: Environment variables for the container
    type: object
    required: false
  - name: resources
    label: Resource Limits
    description: CPU and memory limits/requests
    type: object
    required: false
  - name: labels
    label: Custom Labels
    description: Additional labels to apply to the DaemonSet and its pods
    type: object
    required: false
  - name: serviceAccountName
    label: Service Account
    description: ServiceAccount to use for the pods
    type: string
    required: false
  - name: imagePullPolicy
    label: Image Pull Policy
    description: When to pull the container image
    type: select
    required: false
    options:
      - value: "Always"
        label: "Always - Pull every time"
      - value: "IfNotPresent"
        label: "IfNotPresent - Pull only if not cached"
      - value: "Never"
        label: "Never - Use local image only"
  - name: volumeMounts
    label: Volume Mounts
    description: "Volumes to mount into the container. Each item has: name (string), mountPath (string), type (configMap|secret|hostPath|persistentVolumeClaim), hostPath (string, for hostPath type), hostPathType (string, defaults to Directory)"
    type: array
    required: false
  - name: securityContext
    label: Security Context
    description: "Security settings for the container. Fields: privileged (boolean), runAsUser (number), capabilities (array of strings)"
    type: object
    required: false
  - name: imagePullSecrets
    label: Image Pull Secrets
    description: Names of Kubernetes secrets for pulling images from private registries
    type: array
    required: false
