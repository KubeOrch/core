id: core/secret
name: secret
displayName: Secret
category: configuration
description: Store sensitive data such as passwords, tokens, and keys
icon: Lock
version: "1.0.0"
tags:
  - configuration
  - secret
  - security
usageFrequency: high
difficulty: easy
dependencies: []
parameters:
  - name: name
    label: Secret Name
    description: Name of the Secret
    type: string
    required: true
    default: "my-secret"
  - name: namespace
    label: Namespace
    description: Kubernetes namespace
    type: string
    required: false
    default: "default"
  - name: secretType
    label: Secret Type
    description: Type of Kubernetes Secret
    type: select
    required: false
    default: "Opaque"
    options:
      - value: "Opaque"
        label: "Opaque - Generic secret"
      - value: "kubernetes.io/tls"
        label: "TLS Certificate"
      - value: "kubernetes.io/dockerconfigjson"
        label: "Docker Registry"
  - name: data
    label: Secret Data
    description: Key-value pairs to store in the Secret (values will be base64 encoded)
    type: object
    required: false
  - name: mountPath
    label: Mount Path
    description: Directory path where Secret will be mounted in containers
    type: string
    required: false
    default: "/etc/secrets"
